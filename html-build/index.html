function CTAButton({ children, href, onClick, large = false, dark = false, outline = false }) {
  const Tag = href ? "a" : "button";
  let bg, color, border;
  if (outline) {
    bg = "transparent";
    color = BRAND.white;
    border = "2px solid rgba(255,255,255,0.3)";
  } else if (dark) {
    bg = BRAND.charcoal;
    color = BRAND.white;
    border = "1px solid rgba(255,255,255,0.2)";
  } else {
    bg = BRAND.blue;
    color = BRAND.white;
    border = "none";
  }
  return (
    <Tag href={href} onClick={onClick} style={{
      display: "inline-flex", alignItems: "center", gap: 8,
      padding: large ? "16px 36px" : "12px 28px",
      fontSize: large ? 15 : 13, fontWeight: 700,
      fontFamily: "'Bricolage Grotesque', sans-serif",
      background: bg, color: color, border: border,
      textDecoration: "none", transition: "all 0.25s ease",
      letterSpacing: 1, textTransform: "uppercase",
    }}>
      {children}
    </Tag>
  );
}

        </div>
      </section>

      {/* === HOW IT WORKS (Detailed) === */}
      <section id="how-it-works" style={{ padding: "100px 24px", background: BRAND.pale }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <SectionTitle label="Built for PH" title="Built for Philippine Businesses" center />
          <p style={{ textAlign: "center", color: BRAND.grayDark, fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.75, maxWidth: 640, margin: "-24px auto 56px" }}>
            Every feature designed with Filipino SMEs in mind. From payment methods to local compliance, multi-channel selling to Taglish conversations.
          </p>
          <div className="features-grid" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
            {FEATURES.map((f, i) => (
              <div key={i} className="feature-card" style={{ background: BRAND.white, padding: "32px 24px", border: "1px solid #E2E8F0", transition: "all 0.3s ease", borderRadius: 4 }}>
                <div style={{ marginBottom: 16, lineHeight: 0 }}>
                  <FeatureIcon id={f.icon} size={40} color={BRAND.blue} />
                </div>
                <h3 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 16, fontWeight: 700, color: BRAND.charcoal, marginBottom: 8 }}>{f.title}</h3>
                <p style={{ fontSize: 14, lineHeight: 1.75, color: BRAND.grayDark }}>{f.desc}</p>
              </div>
            ))}
          </div>

          {/* Integration badges */}
          <div style={{ textAlign: "center", marginTop: 56 }}>
            <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: BRAND.charcoal }}>Works Where You Work</span>
            <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 10, marginTop: 20 }}>
              {INTEGRATION_LOGOS.map((name, i) => (
                <div key={i} className="integration-badge" style={{ padding: "8px 16px", background: BRAND.white, border: "1px solid #E2E8F0", fontSize: 13, fontWeight: 600, color: BRAND.charcoal, transition: "all 0.2s ease", borderRadius: 4 }}>
                  {name}
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* === PRICING === */}
      <section id="pricing" style={{ padding: "100px 24px", background: BRAND.white }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <SectionTitle label="Pricing" title="Simple, Commission-Based Pricing" center />
          <p style={{ textAlign: "center", color: BRAND.grayDark, fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.75, maxWidth: 640, margin: "-24px auto 56px" }}>
            No setup fees. No monthly charges. We only succeed when you succeed.
          </p>
          <div className="pricing-grid" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20, alignItems: "start" }}>
            {PRICING.map((plan, i) => (
              <div key={i} className="pricing-card" style={{
                background: plan.popular ? BRAND.charcoal : BRAND.white,
                border: plan.popular ? "2px solid " + BRAND.blue : "1px solid #E2E8F0",
                padding: "40px 28px",
                textAlign: "center",
                transition: "all 0.3s ease",
                position: "relative",
                borderRadius: 4,
              }}>
                {plan.popular && (
                  <div style={{ position: "absolute", top: -1, left: "50%", transform: "translateX(-50%)", background: BRAND.blue, color: BRAND.white, padding: "4px 20px", fontSize: 11, fontWeight: 800, fontFamily: "'Bricolage Grotesque', sans-serif", letterSpacing: 2, textTransform: "uppercase" }}>
                    Most Popular
                  </div>
                )}
                <h3 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 20, fontWeight: 800, color: plan.popular ? BRAND.white : BRAND.charcoal, marginBottom: 4 }}>{plan.name}</h3>
                <p style={{ fontSize: 13, color: plan.popular ? "rgba(255,255,255,0.5)" : BRAND.gray, marginBottom: 24 }}>{plan.tagline}</p>
                <div style={{ marginBottom: 8 }}>
                  <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 48, fontWeight: 800, color: plan.popular ? BRAND.blue : BRAND.charcoal }}>{plan.price}</span>
                </div>
                <p style={{ fontSize: 13, color: plan.popular ? "rgba(255,255,255,0.4)" : BRAND.gray, marginBottom: 32 }}>{plan.unit}</p>
                <div style={{ borderTop: "1px solid " + (plan.popular ? "rgba(255,255,255,0.1)" : "#E2E8F0"), paddingTop: 24, marginBottom: 24 }}>
                  {plan.features.map((f, j) => (
                    <div key={j} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", justifyContent: "flex-start" }}>
                      <CheckIcon size={16} color={plan.popular ? BRAND.green : BRAND.green} />
                      <span style={{ fontSize: 14, color: plan.popular ? "rgba(255,255,255,0.7)" : BRAND.grayDark, textAlign: "left" }}>{f}</span>
                    </div>
                  ))}
                </div>
                <a href="#contact" style={{
                  display: "block",
                  padding: "14px 24px",
                  fontSize: 13,
                  fontWeight: 800,
                  fontFamily: "'Bricolage Grotesque', sans-serif",
                  background: plan.popular ? BRAND.blue : BRAND.charcoal,
                  color: BRAND.white,
                  textDecoration: "none",
                  letterSpacing: 1.5,
                  textTransform: "uppercase",
                  transition: "all 0.25s ease",
                }}>
                  {plan.cta}
                </a>
              </div>
            ))}
          </div>
          <p style={{ textAlign: "center", marginTop: 32, fontSize: 13, color: BRAND.gray }}>
            All plans include 14-day free trial. No credit card required.
          </p>
        </div>
      </section>

      {/* === TESTIMONIALS === */}
      <section style={{ padding: "100px 24px", background: BRAND.pale }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", textAlign: "center" }}>
          <SectionTitle label="Testimonials" title="Trusted by Philippine Businesses" center />
          <p style={{ color: BRAND.grayDark, fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.75, maxWidth: 600, margin: "-24px auto 56px" }}>
            See what SME owners are saying about AIhente and FutureFit's AI solutions.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 20 }}>
            {TESTIMONIALS.map((t, i) => (
              <div key={i} className="testimonial-card" style={{ background: BRAND.white, padding: "36px 28px", border: "1px solid #E2E8F0", textAlign: "left", transition: "all 0.3s ease", borderRadius: 4 }}>
                <div style={{ display: "flex", gap: 2, marginBottom: 16 }}>
                  {Array.from({ length: t.rating }).map((_, j) => (
                    <svg key={j} width="16" height="16" viewBox="0 0 24 24" fill={BRAND.amber}><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  ))}
                </div>
                <p style={{ fontSize: 14, lineHeight: 1.75, color: BRAND.grayDark, marginBottom: 20, fontStyle: "italic" }}>"{t.quote}"</p>
                <div style={{ borderTop: "1px solid #E2E8F0", paddingTop: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, " + BRAND.blue + ", " + BRAND.green + ")", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 14, fontWeight: 800, color: BRAND.white }}>
                      {t.name.split(" ").map(n => n[0]).join("")}
                    </div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.charcoal }}>{t.name}</div>
                      <div style={{ fontSize: 12, color: BRAND.gray }}>{t.role}</div>
                      <div style={{ fontSize: 11, color: BRAND.gray }}>{t.location}</div>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* === WHY FUTUREFIT === */}
      <section id="why-us" style={{ padding: "100px 24px", background: BRAND.charcoal }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <SectionTitle label="Why FutureFit" title="Five Reasons FutureFit is Your Growth Partner" dark center />
          <p style={{ textAlign: "center", color: "rgba(255,255,255,0.55)", fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.75, maxWidth: 640, margin: "-24px auto 56px" }}>
            We're not just another AI company. We're your strategic partner, built for the Philippine market, committed to your growth.
          </p>
          <div className="reasons-grid" style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 20 }}>
            {REASONS.map((item, i) => (
              <div key={i} className="reason-card" style={{
                background: "rgba(255,255,255,0.04)",
                border: "1px solid rgba(255,255,255,0.08)",
                padding: "36px 28px",
                transition: "all 0.3s ease",
                display: "flex",
                flexDirection: "column",
                width: "calc((100% - 40px) / 3)",
              }}>
                <div style={{ marginBottom: 20, lineHeight: 0 }}>
                  <WhyIcon num={item.num} size={44} />
                </div>
                <h3 style={{
                  fontFamily: "'Bricolage Grotesque', sans-serif",
                  fontSize: "clamp(16px, 2vw, 19px)",
                  fontWeight: 800,
                  color: BRAND.white,
                  marginBottom: 12,
                  lineHeight: 1.3,
                }}>{item.title}</h3>
                <p style={{ fontSize: 14, lineHeight: 1.8, color: "rgba(255,255,255,0.55)", flex: 1 }}>{item.desc}</p>
                <div className="reason-underline" style={{ width: 32, height: 2, background: BRAND.blue, marginTop: 20, opacity: 0.6, transition: "all 0.3s ease" }} />
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* === FAQ === */}
      <section id="faq" style={{ padding: "100px 24px", background: BRAND.white }}>
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <SectionTitle label="Questions?" title="Frequently Asked Questions" />
          <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
            {FAQS.map((f, i) => (
              <div key={i} className="faq-item" style={{ borderTop: "1px solid #E2E8F0", transition: "background 0.2s" }}>
                <button onClick={() => setOpenFaq(openFaq === i ? null : i)} style={{ width: "100%", padding: "20px 0", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
                  <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 15, fontWeight: 700, color: BRAND.charcoal, paddingRight: 16 }}>{f.q}</span>
                  <span style={{ transform: openFaq === i ? "rotate(180deg)" : "none", transition: "transform 0.3s", flexShrink: 0, color: BRAND.charcoal }}><ChevronDown /></span>
                </button>
                {openFaq === i && (
                  <div style={{ padding: "0 0 20px", fontSize: 14, lineHeight: 1.75, color: BRAND.grayDark }}>{f.a}</div>
                )}
              </div>
            ))}
            <div style={{ borderTop: "1px solid #E2E8F0" }} />
          </div>
        </div>
      </section>

      {/* === CONTACT / CTA === */}
      <section id="contact" style={{ padding: "100px 24px", background: BRAND.charcoal }}>
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <SectionTitle label="Get Started" title="Ready to Grow with AI?" dark />
          <p style={{ color: "rgba(255,255,255,0.55)", fontSize: 15, lineHeight: 1.75, marginBottom: 48, maxWidth: 560 }}>
            Start your free 14-day trial today. No credit card required. Discover how AIhente and FutureFit's AI solutions can transform your business.
          </p>
          <form onSubmit={handleContact} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: BRAND.blue, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, fontFamily: "'Bricolage Grotesque', sans-serif" }}>Full Name *</label>
              <input name="name" required placeholder="Your full name" style={{ width: "100%", padding: "12px 16px", background: "transparent", border: "1px solid rgba(255,255,255,0.2)", color: BRAND.white, fontSize: 14, outline: "none" }} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: BRAND.blue, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, fontFamily: "'Bricolage Grotesque', sans-serif" }}>Email *</label>
              <input name="email" type="email" required placeholder="you@company.com" style={{ width: "100%", padding: "12px 16px", background: "transparent", border: "1px solid rgba(255,255,255,0.2)", color: BRAND.white, fontSize: 14, outline: "none" }} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: BRAND.blue, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, fontFamily: "'Bricolage Grotesque', sans-serif" }}>Phone</label>
              <input name="phone" type="tel" placeholder="+63 9XX XXX XXXX" style={{ width: "100%", padding: "12px 16px", background: "transparent", border: "1px solid rgba(255,255,255,0.2)", color: BRAND.white, fontSize: 14, outline: "none" }} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: BRAND.blue, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, fontFamily: "'Bricolage Grotesque', sans-serif" }}>I'm Interested In</label>
              <select name="interest" style={{ width: "100%", padding: "12px 16px", background: "transparent", border: "1px solid rgba(255,255,255,0.2)", color: BRAND.white, fontSize: 14, outline: "none" }}>
                <option value="" style={{ color: BRAND.charcoal }}>Select a solution</option>
                <option value="aihente" style={{ color: BRAND.charcoal }}>AIhente - AI Sales Agent</option>
                <option value="automation" style={{ color: BRAND.charcoal }}>AI Automation</option>
                <option value="analytics" style={{ color: BRAND.charcoal }}>AI Analytics</option>
                <option value="full-suite" style={{ color: BRAND.charcoal }}>Full AI Suite</option>
                <option value="consultation" style={{ color: BRAND.charcoal }}>AI Strategy Consultation</option>
              </select>
            </div>
            <div style={{ gridColumn: "1 / -1" }}>
              <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: BRAND.blue, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6, fontFamily: "'Bricolage Grotesque', sans-serif" }}>Tell us about your business</label>
              <textarea name="goals" rows={4} placeholder="What does your business do? What are your goals?" style={{ width: "100%", padding: "12px 16px", background: "transparent", border: "1px solid rgba(255,255,255,0.2)", color: BRAND.white, fontSize: 14, outline: "none", resize: "vertical" }} />
            </div>
            <div style={{ gridColumn: "1 / -1" }}>
              <CTAButton large>Start Your Free Trial</CTAButton>
            </div>
          </form>
          <div style={{ borderTop: "1px solid rgba(255,255,255,0.1)", marginTop: 48, paddingTop: 32, display: "flex", flexWrap: "wrap", gap: 28, color: "rgba(255,255,255,0.45)", fontSize: 13 }}>
            <span>hello@futurefit.ph</span>
            <span>AIhente.com</span>
            <span>Metro Manila, Philippines</span>
          </div>
        </div>
      </section>

      {/* === FOOTER === */}
      <footer style={{ padding: "36px 24px", background: BRAND.black, textAlign: "center" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 12 }}>
            <LogoMark size={28} />
            <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 14, color: "rgba(255,255,255,0.6)", letterSpacing: 1 }}>FUTUREFIT, INC.</span>
          </div>
          <p style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", marginBottom: 6 }}>Your AI Strategy Partner for Philippine SMEs</p>
          <p style={{ fontSize: 12, color: "rgba(255,255,255,0.25)", marginBottom: 4 }}>
            Flagship Product: <a href="https://aihente.com" style={{ color: BRAND.blue, textDecoration: "none" }}>AIhente.com</a> &mdash; Commission-Based AI Sales Agents
          </p>
          <p style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>&copy; {new Date().getFullYear()} FutureFit, Inc. | futurefit.ph</p>
        </div>
      </footer>

      {/* === CHATBOT WIDGET === */}
      {(showChat || chatOpen) && (
      <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 999 }}>
        {chatOpen && (
          <div style={{ width: 360, maxWidth: "calc(100vw - 48px)", height: 480, maxHeight: "calc(100vh - 120px)", background: BRAND.white, border: "1px solid #E2E8F0", display: "flex", flexDirection: "column", overflow: "hidden", marginBottom: 16, borderRadius: 8 }}>
            <div style={{ padding: "16px 20px", background: BRAND.charcoal, display: "flex", alignItems: "center", gap: 12 }}>
              <LogoMark size={36} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: BRAND.white, fontFamily: "'Bricolage Grotesque', sans-serif" }}>AIhente Assistant</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", display: "flex", alignItems: "center", gap: 4 }}>
                  <span className="live-pulse" style={{ width: 6, height: 6, borderRadius: "50%", background: BRAND.green, display: "inline-block" }} />
                  Online now
                </div>
              </div>
              <button onClick={() => setChatOpen(false)} style={{ color: "rgba(255,255,255,0.6)", padding: 4 }}><XIcon /></button>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: 16, background: BRAND.pale }}>
              {chatMessages.map((m, i) => (
                <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 12 }}>
                  <div style={{ maxWidth: "80%", padding: "10px 14px", background: m.role === "user" ? BRAND.charcoal : BRAND.white, color: m.role === "user" ? BRAND.white : BRAND.charcoal, fontSize: 14, lineHeight: 1.6, borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px", border: m.role === "assistant" ? "1px solid #E2E8F0" : "none" }} dangerouslySetInnerHTML={{ __html: renderChatText(m.text) }} />
                </div>
              ))}
              <div ref={chatEndRef} />
            </div>
            <form onSubmit={(e) => { e.preventDefault(); if (chatInput.trim()) { handleChat(chatInput.trim()); setChatInput(""); } }} style={{ padding: "12px 16px", borderTop: "1px solid #E2E8F0", display: "flex", gap: 8, background: BRAND.white }}>
              <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Ask about AIhente, pricing..." style={{ flex: 1, padding: "10px 14px", border: "1px solid #E2E8F0", fontSize: 14, outline: "none", borderRadius: 6 }} />
              <button type="submit" style={{ width: 40, height: 40, background: BRAND.blue, color: BRAND.white, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 6 }}><SendIcon /></button>
            </form>
            <div style={{ padding: "8px 16px", background: BRAND.sage, textAlign: "center", fontSize: 11, color: BRAND.gray, borderTop: "1px solid #E2E8F0" }}>
              Powered by FutureFit AI
            </div>
          </div>
        )}
        {!chatOpen && (
        <button className="chatbot-btn-glow" onClick={() => setChatOpen(true)} aria-label="Open chat" style={{ width: 56, height: 56, background: BRAND.charcoal, color: BRAND.white, display: "flex", alignItems: "center", justifyContent: "center", animation: "pulse 2s infinite", transition: "all 0.25s", border: "none", boxShadow: "none", outline: "none", padding: 0, borderRadius: "50%" }}>
          <ChatIcon />
        </button>
        )}
      </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LandingPage />);
</script>
</body>
</html>
