name: Deploy to ECS

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/futurefit-landing-page
  CONTAINER_NAME: futurefit-landing-page
  CONTAINER_PORT: 80
  HOST_PORT: 3020
  ECS_DEPLOY_DIR: /opt/qoder-deployments/futurefit-landing-page

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            # Create deploy directory
            mkdir -p ${{ env.ECS_DEPLOY_DIR }}

            # Pull latest image from GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null || true
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up old images
            docker image prune -f

            # Verify container is running
            docker ps --filter name=${{ env.CONTAINER_NAME }} --format "{{.Names}} {{.Status}}"
